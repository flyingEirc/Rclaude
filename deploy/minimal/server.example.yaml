listen: ":9326"
auth:
  tokens:
    "tok-demo": "demo"
fuse:
  mountpoint: "/workspace"
pty:
  # Leave binary unset (default) to hand the user their interactive login shell
  # in /workspace/<user_id>: they can ls/cd and launch claude/codex themselves.
  # Set it only to pin a specific program, e.g. "claude", "codex", or "/bin/sh".
  # binary: ""
  # Optional server-side argv appended after pty.binary (ignored for the default
  # login shell). The client cannot override this.
  args: []
  workspace_root: "/workspace"
  env_passthrough:
    - "TERM"
    - "LANG"
    - "LC_ALL"
    - "LC_CTYPE"
    - "PATH"
    - "HOME"
    - "SHELL"
    - "CLAUDE_CONFIG_DIR"
    # Optional for Server-side env-based Claude auth/gateway routing:
    # - "ANTHROPIC_*"
    # - "CLAUDE_CODE_*"
  frame_max_bytes: 65536
  graceful_shutdown_timeout: "5s"
  ratelimit:
    attach_qps: 1
    attach_burst: 3
    stdin_bps: 1048576
    stdin_burst: 262144
log:
  level: "info"
  format: "json"          # json（默认）| text
  # dir: ""                # 日志目录，省略时用 ~/.rclaude/logs
  # max_size_mb: 100       # 单文件轮转大小
  # max_backups: 3         # 保留轮转文件个数
  # max_age_days: 7        # 轮转文件保留天数
