# Server-machine config. 只保留必须由部署者提供的项。
#
# 以下均已在代码里写死、不再可配置：
#   - PTY 运行环境：工作区根 = fuse.mountpoint（同源）、env 白名单、帧上限 65536、
#     优雅退出 5s、attach/stdin 限速（默认值）；
#   - 日志：全等级（debug）落地 + JSON 格式，目录 ~/.rclaude/logs、默认轮转；
#   - 要运行哪个 agent 由客户端 rclaude -g/--agent 声明，随 attach 请求下发。
listen: ":9326"
auth:
  tokens:
    "tok-demo": "demo"
fuse:
  mountpoint: "/workspace"
