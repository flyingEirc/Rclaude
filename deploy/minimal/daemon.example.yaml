# Daemon-machine config. 统一入口 `rclaude`（app/rclaude）读取本文件，同时拉起
# daemon 与远端 claude PTY attach，是 daemon 侧的默认启动方式。
# 拆分诊断时，同一份文件也可分别喂给 `rclaude-daemon` 与 `rclaude-claude`。
server:
  address: "SERVER_IP:9326"
  token: "tok-demo"
  # Optional TLS to a Caddy (or other) TLS terminator in front of the server.
  # Omit or set enabled=false to keep plaintext gRPC (default, unchanged).
  # See docs/design/caddy-tls-termination.md and deploy/tls/.
  # tls:
  #   enabled: true
  #   # address above should then be the TLS endpoint, e.g. "rclaude.example.com:443".
  #   server_name: ""          # SNI/cert name; defaults to address host. Set it
  #                            # explicitly when address is a raw IP but the cert
  #                            # is issued for a domain.
  #   ca_file: ""              # PEM root CA for Caddy's internal CA / self-signed.
  #                            # Leave empty for publicly-trusted certs (system roots).
  #   insecure_skip_verify: false  # diagnostics only; never in production.
workspace:
  path: "/absolute/path/to/workspace"
  exclude:
    - ".git"
    - "node_modules"
    - "vendor"
log:
  level: "info"
  format: "json"          # json（默认）| text
  # dir: ""                # 日志目录，省略时用 ~/.rclaude/logs
  # max_size_mb: 100       # 单文件轮转大小
  # max_backups: 3         # 保留轮转文件个数
  # max_age_days: 7        # 轮转文件保留天数
pty:
  # Keep this aligned with server.yaml if you lower the server-side frame cap.
  frame_max_bytes: 65536
  # 预测本地回显（mosh 式）：可预测按键在本地立即上屏，不等服务器回显，
  # 键入延迟与网络 RTT 解耦；预测与服务器真实回显持续对账，错了自动回滚，
  # 服务端不支持（旧版本）时自动退回纯透传。
  #   adaptive —— 默认。仅在链路较慢时显示预测（SRTT > 60ms 开启，
  #               更慢时预测字符加下划线提示）；低延迟链路行为与纯透传一致。
  #   always   —— 无论链路快慢都显示预测（调试/极致手感用）。
  #   off      —— 完全关闭，恢复纯透传。
  # predict: "adaptive"
# 统一入口 `rclaude` 的启动协调策略（事件总线驱动的失败重试）。
# max_retries：初始尝试之外允许的重试次数（默认 3）；
# retry_delay：收到重试通知后再次尝试前的等待（默认 1s）。
# startup:
#   max_retries: 3
#   retry_delay: 1s
