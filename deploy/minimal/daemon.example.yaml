# 唯一入口 rclaude 读取本文件：rclaude -g <agent> -c <本文件>
# 要跑哪个 agent 由 -g/--agent 声明，不写在配置里。
# 已写死、不再可配置：日志(全等级+JSON)、启动重试(3 次/5s)、PTY 帧上限(65536)。
server:
  address: "SERVER_IP:9326" # ip/domain:port
  token: "tok-demo" # access token
  # 可选 TLS（前置 Caddy 等终止器）见 docs/design/caddy-tls-termination.md：
  # tls:
  #   enabled: true
  #   server_name: ""   # 直连 IP 但证书签给域名时必填
  #   ca_file: ""       # 自签/内部 CA 的 PEM；公网可信证书留空
workspace:  # 过滤目录/文件
  exclude:
    - ".git"
    - "node_modules"
    - "vendor"
