# Local developer config reused by rclaude-daemon and rclaude-claude.
# Pair with repository-root server-localtest.yaml when running a local/dev server.
# Not part of the deploy/minimal handoff.
server:
  address: "127.0.0.1:9326"
  token: "tok-demo"
workspace:
  path: "E:/Rclaude"
  exclude:
    - ".git"
    - "node_modules"
    - "vendor"
# 日志只写本地文件，终端保持干净。默认目录 ~/.rclaude/logs（Windows 为
# %USERPROFILE%\.rclaude\logs），daemon 写 rclaude-daemon.log。
log:
  level: "info"
  format: "json"          # json（默认）| text
  # dir: "E:/Rclaude-logs" # 日志目录，省略时用默认目录
  # max_size_mb: 100       # 单文件轮转大小
  # max_backups: 3         # 保留轮转文件个数
  # max_age_days: 7        # 轮转文件保留天数
pty:
  frame_max_bytes: 65536
# 统一入口 `rclaude` 的启动协调策略（事件总线驱动的失败重试）。
# max_retries：初始尝试之外允许的重试次数（默认 3）；
# retry_delay：收到重试通知后再次尝试前的等待（默认 1s）。
startup:
  max_retries: 3
  retry_delay: 1s
# Optional: persist every remote file operation into a local database for auditing.
# driver: sqlite | mysql | postgres (aliases: sqlite3, postgresql, pgsql)
# audit:
#   enabled: true
#   driver: "sqlite"
#   dsn: "E:/Rclaude-audit/audit.db"                     # sqlite: file path
#   # dsn: "user:pass@tcp(127.0.0.1:3306)/rclaude"       # mysql
#   # dsn: "postgres://user:pass@127.0.0.1:5432/rclaude" # postgres
#   table: "file_audit_log"   # optional, [A-Za-z0-9_]+ only
#   queue_size: 256           # optional, async write queue capacity
