syntax = "proto3";

package remotefs.v1;

option go_package = "flyingEirc/Rclaude/api/proto/remotefs/v1;remotefsv1";

message FileInfo {
  string path = 1;
  int64 size = 2;
  int64 mod_time = 3;
  bool is_dir = 4;
  uint32 mode = 5;
}

message FileTree {
  repeated FileInfo files = 1;
}

enum ChangeType {
  CHANGE_TYPE_UNSPECIFIED = 0;
  CHANGE_TYPE_CREATE = 1;
  CHANGE_TYPE_MODIFY = 2;
  CHANGE_TYPE_DELETE = 3;
  CHANGE_TYPE_RENAME = 4;
}

message FileChange {
  ChangeType type = 1;
  FileInfo file = 2;
  string old_path = 3;
}

message ReadFileReq {
  string path = 1;
  int64 offset = 2;
  int64 length = 3;
}

message WriteFileReq {
  string path = 1;
  bytes content = 2;
  bool append = 3;
  uint32 mode = 4;
  int64 offset = 5;
}

message StatReq {
  string path = 1;
}

message ListDirReq {
  string path = 1;
}

message DeleteReq {
  string path = 1;
}

message MkdirReq {
  string path = 1;
  bool recursive = 2;
}

message RenameReq {
  string old_path = 1;
  string new_path = 2;
}

message TruncateReq {
  string path = 1;
  int64 size = 2;
}

message FileRequest {
  string request_id = 1;
  oneof operation {
    ReadFileReq read = 2;
    WriteFileReq write = 3;
    StatReq stat = 4;
    ListDirReq list_dir = 5;
    DeleteReq delete = 6;
    MkdirReq mkdir = 7;
    RenameReq rename = 8;
    TruncateReq truncate = 9;
  }
}

message FileResponse {
  string request_id = 1;
  bool success = 2;
  string error = 3;
  oneof result {
    bytes content = 4;
    FileInfo info = 5;
    FileTree entries = 6;
  }
}

message Heartbeat {
  int64 timestamp = 1;
}

message DaemonMessage {
  oneof msg {
    FileTree file_tree = 1;
    FileChange change = 2;
    FileResponse response = 3;
    Heartbeat heartbeat = 4;
  }
}

message ServerMessage {
  oneof msg {
    FileRequest request = 1;
    Heartbeat heartbeat = 2;
  }
}

service RemoteFS {
  rpc Connect(stream DaemonMessage) returns (stream ServerMessage);
}
