name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect code changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.golangci.yml'
              - '.github/workflows/**'
              - 'tools/**'

  ci:
    name: fmt-lint-test-build
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install toolchain
        run: make tools

      - name: Check formatting
        run: make fmt

      - name: Ensure no formatting diff remains
        run: git diff --exit-code

      - name: Run linter
        run: make lint

      - name: Run tests
        run: make test

      - name: Verify build
        run: make build
