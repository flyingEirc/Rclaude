# Local developer config for running rclaude-server on a Linux dev box.
# Pair with repository-root daemon-localtest.yaml.
# Not part of the deploy/minimal handoff.
listen: ":9326"
auth:
  tokens:
    "tok-demo": "demo"
fuse:
  mountpoint: "/workspace"
log:
  level: "info"
  format: "json"          # json（默认）| text
  # dir: ""                # 日志目录，省略时用 ~/.rclaude/logs
  # max_size_mb: 100       # 单文件轮转大小
  # max_backups: 3         # 保留轮转文件个数
  # max_age_days: 7        # 轮转文件保留天数
pty:
  # Use "claude" for real manual PTY acceptance. For scripted transport smoke,
  # temporarily switch this to "/bin/sh".
  binary: "claude"
  workspace_root: "/workspace"
  env_passthrough:
    - "TERM"
    - "LANG"
    - "LC_ALL"
    - "LC_CTYPE"
    - "PATH"
  frame_max_bytes: 65536
